server:
  port: 8090
  servlet:
    context-path: /api/v1

spring:
  datasource:
    # Aquí es donde ocurre la magia: concatenamos tus variables
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Opcional: Para ver errores de conexión más claros en la consola
logging:
  level:
    org.hibernate.SQL: INFO
    com.zaxxer.hikari: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html