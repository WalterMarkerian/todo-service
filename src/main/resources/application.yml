server:
  port: 8090

spring:
  datasource:
    # Agregamos las barras inclinadas // que faltaban en el protocolo
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      # 'update' es ideal para desarrollo, en producción se usa 'validate'
      ddl-auto: ${DB_DDL:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: INFO
    com.zaxxer.hikari: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html