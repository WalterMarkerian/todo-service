server:
  port: 8090
  # ESTA LÍNEA ES LA CLAVE PARA EL PROXY
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: INFO
    com.zaxxer.hikari: INFO

springdoc:
  api-docs:
    path: /api/v1/v3/api-docs
  swagger-ui:
    # Esto habilita la interfaz en /swagger-ui/index.html
    path: /todo/swagger
    enabled: true
  # Ayuda a que Swagger use las rutas relativas del proxy
  writer-with-default-pretty-printer: true