server:
  port: 8090
  # ESTA LÍNEA ES LA CLAVE PARA EL PROXY
  forward-headers-strategy: native

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: INFO
    com.zaxxer.hikari: INFO

springdoc:
  # Esto fuerza a Swagger a usar la URL del servidor que está recibiendo la petición
  show-login-endpoint: true
  api-docs:
    # Este es el JSON que describe tu API. Lo hacemos único para TODO.
    path: /api/v1/todo-docs
  swagger-ui:
    # USAMOS ESTO: Es la ruta interna donde Spring servirá el HTML.
    # Evitamos /todo/ acá para que no choque con los recursos estáticos.
    path: /swagger-ui.html
    # FORZAMOS a que Swagger lea TU JSON específico y no el de otra app.
    url: /api/v1/todo-docs
    enabled: true
  writer-with-default-pretty-printer: true
